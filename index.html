<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f0f1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Platine">
<title>Platine Guides</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0f0f1a;
    --bg2:    #161624;
    --bg3:    #1e1e32;
    --border: #2a2a45;
    --text:   #e8e4f0;
    --dim:    #7a7a9a;
    --faint:  #3a3a5a;
    --gold:   #c9902a;
    --gold2:  #f0c060;
    --green:  #4caf80;
    --accent: #7c6fff;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', system-ui, sans-serif;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  /* ── TOP BAR ── */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(15,15,26,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-title .icon { font-size: 20px; }

  .header-title h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .header-title span {
    font-size: 13px;
    font-weight: 400;
    color: var(--dim);
    margin-left: 2px;
  }

  .update-btn {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--gold);
    color: #1a0f00;
    border: none;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    animation: pulse 2s infinite;
  }

  .update-btn.visible { display: flex; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.75; }
  }

  /* ── HERO ── */
  .hero {
    padding: 32px 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .hero-greeting {
    font-size: 13px;
    font-weight: 500;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .hero h2 {
    font-size: 26px;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .hero h2 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats-row {
    display: flex;
    gap: 12px;
  }

  .stat-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .stat-chip strong {
    font-size: 20px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .stat-chip span {
    font-size: 10px;
    font-weight: 500;
    color: var(--dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── GUIDES LIST ── */
  .section-header {
    padding: 24px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .section-header h3 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--dim);
  }

  .guides-list {
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── GUIDE CARD ── */
  .guide-card {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg2);
    text-decoration: none;
    display: block;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }

  .guide-card:active {
    transform: scale(0.985);
  }

  .card-cover {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
    background: var(--bg3);
  }

  .card-cover-fallback {
    width: 100%;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    background: var(--bg3);
  }

  .card-body {
    padding: 14px 16px 16px;
  }

  .card-platform {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.3px;
  }

  .card-subtitle {
    font-size: 13px;
    font-weight: 400;
    color: var(--dim);
    margin-bottom: 12px;
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .meta-pill {
    background: var(--bg3);
    border: 1px solid var(--faint);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 500;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-pill.trophy { color: var(--gold2); }
  .meta-pill.diff   { color: var(--green); }

  .card-arrow {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 30px;
    height: 30px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--dim);
    backdrop-filter: blur(4px);
  }

  /* ── OFFLINE BANNER ── */
  .offline-banner {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #3a2020;
    border-top: 1px solid #7a4040;
    color: #f0a0a0;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    text-align: center;
    z-index: 100;
  }

  /* ── SKELETON LOADING ── */
  .skeleton {
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg2);
    animation: shimmer 1.5s infinite;
  }

  .skeleton .sk-cover {
    width: 100%;
    height: 130px;
    background: var(--bg3);
  }

  .skeleton .sk-body {
    padding: 14px 16px 16px;
  }

  .sk-line {
    height: 12px;
    border-radius: 6px;
    background: var(--bg3);
    margin-bottom: 10px;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--dim);
  }

  .empty .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h4 { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── INSTALL PROMPT ── */
  .install-banner {
    display: none;
    margin: 0 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, #1e1840, #2a1f50);
    border: 1px solid #4a3a80;
    padding: 14px 16px;
    align-items: center;
    gap: 12px;
  }

  .install-banner.visible { display: flex; }

  .install-icon { font-size: 24px; flex-shrink: 0; }

  .install-text { flex: 1; }
  .install-text strong { font-size: 14px; font-weight: 700; color: var(--text); display: block; }
  .install-text span { font-size: 12px; color: var(--dim); }

  .install-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
  }

  .install-close {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 18px;
    cursor: pointer;
    padding: 0 4px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="icon">🏆</span>
    <h1>Platine <span>Guides</span></h1>
  </div>
  <button class="update-btn" id="update-btn" onclick="applyUpdate()">
    ↑ Mise à jour
  </button>
</header>

<main>
  <div class="hero">
    <div class="hero-greeting">Mes guides personnels</div>
    <h2>Chasse aux <em>Trophées</em></h2>
    <div class="stats-row" id="stats-row">
      <div class="stat-chip"><strong id="stat-guides">–</strong><span>Guides</span></div>
      <div class="stat-chip"><strong id="stat-trophies">–</strong><span>Trophées</span></div>
    </div>
  </div>

  <div class="section-header">
    <h3>Tous les guides</h3>
  </div>

  <div class="install-banner" id="install-banner">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <strong>Installer l'appli</strong>
      <span>Accès rapide depuis l'écran d'accueil</span>
    </div>
    <button class="install-btn" id="install-btn">Installer</button>
    <button class="install-close" onclick="dismissInstall()">✕</button>
  </div>

  <div class="guides-list" id="guides-list">
    <!-- Skeletons pendant le chargement -->
    <div class="skeleton"><div class="sk-cover"></div><div class="sk-body"><div class="sk-line" style="width:40%"></div><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:55%"></div></div></div>
    <div class="skeleton"><div class="sk-cover"></div><div class="sk-body"><div class="sk-line" style="width:40%"></div><div class="sk-line" style="width:70%"></div><div class="sk-line" style="width:55%"></div></div></div>
  </div>
</main>

<div class="offline-banner" id="offline-banner">
  📵 Hors-ligne — contenu mis en cache disponible
</div>

<script>
// ── SERVICE WORKER ──────────────────────────────────────────
let newWorker = null;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { scope: './' })
    .then(reg => {
      // Détecter une mise à jour disponible
      reg.addEventListener('updatefound', () => {
        newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            document.getElementById('update-btn').classList.add('visible');
          }
        });
      });

      // Vérifier les mises à jour toutes les 5 minutes
      setInterval(() => reg.update(), 5 * 60 * 1000);
    })
    .catch(console.error);

  // Rechargement après activation du nouveau SW
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; location.reload(); }
  });
}

function applyUpdate() {
  if (newWorker) newWorker.postMessage('SKIP_WAITING');
  else location.reload();
}

// ── OFFLINE ─────────────────────────────────────────────────
window.addEventListener('online',  () => document.getElementById('offline-banner').style.display = 'none');
window.addEventListener('offline', () => document.getElementById('offline-banner').style.display = 'block');
if (!navigator.onLine) document.getElementById('offline-banner').style.display = 'block';

// ── INSTALL PROMPT ───────────────────────────────────────────
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('install-dismissed')) {
    document.getElementById('install-banner').classList.add('visible');
  }
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('visible');
});

function dismissInstall() {
  localStorage.setItem('install-dismissed', '1');
  document.getElementById('install-banner').classList.remove('visible');
}

// ── CHARGEMENT DES GUIDES ────────────────────────────────────
async function loadGuides() {
  try {
    const res   = await fetch('./games.json');
    const games = await res.json();
    renderGuides(games);
  } catch (err) {
    document.getElementById('guides-list').innerHTML = `
      <div class="empty">
        <div class="empty-icon">😶</div>
        <h4>Impossible de charger les guides</h4>
        <p>Vérifiez votre connexion ou rechargez la page.</p>
      </div>`;
  }
}

function renderGuides(games) {
  const list = document.getElementById('guides-list');

  // Stats
  const totalTrophies = games.reduce((a, g) => a + (g.trophies || 0), 0);
  document.getElementById('stat-guides').textContent   = games.length;
  document.getElementById('stat-trophies').textContent = totalTrophies;

  if (games.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📂</div>
        <h4>Aucun guide pour l'instant</h4>
        <p>Ajoutez des fichiers HTML dans le dossier <code>guides/</code> et mettez à jour <code>games.json</code>.</p>
      </div>`;
    return;
  }

  list.innerHTML = games.map(game => `
    <a class="guide-card" href="${game.file}">
      ${game.cover
        ? `<img class="card-cover" src="${game.cover}" alt="${game.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="card-cover-fallback" style="background:${game.color || 'var(--bg3)'};display:${game.cover ? 'none' : 'flex'}">🎮</div>
      <div class="card-body">
        <div class="card-platform">${game.platform || 'PS5'}</div>
        <div class="card-title">${game.title}</div>
        ${game.subtitle ? `<div class="card-subtitle">${game.subtitle}</div>` : ''}
        <div class="card-meta">
          ${game.trophies ? `<span class="meta-pill trophy">🏆 ${game.trophies} trophées</span>` : ''}
          ${game.difficulty ? `<span class="meta-pill diff">⚡ ${game.difficulty}</span>` : ''}
          ${game.note ? `<span class="meta-pill">${game.note}</span>` : ''}
        </div>
      </div>
      <div class="card-arrow">›</div>
    </a>
  `).join('');

  // Pré-mise en cache des guides listés
  if ('caches' in window) {
    caches.open('platine-guides-prefetch').then(cache => {
      games.forEach(g => cache.add(g.file).catch(() => {}));
    });
  }
}

loadGuides();
</script>
</body>
</html>
